name: "\U0001F7E2 Improvement Idea"
description: A suggestion to make the template better
labels: ["idea", "triage"]
body:
  - type: dropdown
    id: zone
    attributes:
      label: Zone
      description: Which part of the template does this relate to?
      options:
        - align
        - plan
        - execute
        - improve
        - shared
        - agent
    validations:
      required: true

  - type: textarea
    id: what-would-improve
    attributes:
      label: What would improve
      placeholder: "Currently... but it would be better if..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Proposed change
      placeholder: "Specifically, I suggest..."
    validations:
      required: true
